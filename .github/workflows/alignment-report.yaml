name: Dependency Alignment Report

on:
  schedule:
    # Every Monday at 10:00 UTC (after drift at 8:00, workspace-check at 9:00)
    - cron: '0 10 * * 1'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

env:
  REPOS: >-
    pipeline triggers chains cli results
    pipelines-as-code dashboard plumbing pruner

jobs:
  alignment-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Clone Tekton repos
        run: |
          for repo in $REPOS; do
            echo "::group::Cloning $repo"
            git clone --depth 1 --quiet \
              "https://github.com/tektoncd/${repo}.git" "repos/${repo}" || \
              echo "::warning::Failed to clone $repo"
            echo "::endgroup::"
          done

      - name: Generate alignment report
        run: |
          ./hack/alignment-report.py \
            --repos-dir ./repos \
            --verify \
            -o alignment-report.md

          cat alignment-report.md

      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('alignment-report.md', 'utf8');
            const label = 'dependency-alignment';

            // Count repos that need updates vs already aligned
            const needsUpdate = (report.match(/🔧 needs update/g) || []).length;
            const aligned = (report.match(/✅ already aligned/g) || []).length;
            const total = needsUpdate + aligned;
            const buildFails = (report.match(/❌/g) || []).length;

            let status = '✅ all aligned';
            if (needsUpdate > 0) {
              status = buildFails > 0
                ? `🔧 ${needsUpdate} repos need updates (${buildFails} build failures)`
                : `🔧 ${needsUpdate} repos need updates`;
            }

            const title = `🔧 Dependency Alignment — ${status}`;

            // Ensure label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: '0e8a16',
                description: 'Automated dependency alignment report',
              });
            } catch (e) { /* exists */ }

            // Find existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              const issue = issues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title,
                body: report,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `🔄 **Weekly update** (${new Date().toISOString().split('T')[0]})\n\n${report}`,
              });
              core.info(`Updated issue #${issue.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: report,
                labels: [label],
              });
              core.info(`Created issue #${newIssue.number}`);
            }

            // Auto-close if everything is aligned
            if (needsUpdate === 0 && issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info('All repos aligned — closed issue');
            }
