name: Dependency Drift Report

on:
  schedule:
    # Every Monday at 8:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

env:
  REPOS: >-
    pipeline triggers chains cli results
    operator pipelines-as-code dashboard
    plumbing pruner

jobs:
  drift-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Clone Tekton repos
        run: |
          mkdir -p repos
          for repo in $REPOS; do
            echo "::group::Cloning $repo"
            git clone --depth 1 --quiet \
              "https://github.com/tektoncd/${repo}.git" "repos/${repo}" || \
              echo "::warning::Failed to clone $repo"
            echo "::endgroup::"
          done

      - name: Generate drift report
        run: |
          ./hack/dependency-drift.py \
            --repos-dir ./repos \
            --format markdown \
            --fix \
            -o drift-report.md \
            || true  # non-zero exit = drift detected, that's expected

          cat drift-report.md

      - name: Create or update drift issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('drift-report.md', 'utf8');
            const label = 'dependency-drift';

            // Extract counts from the report summary table
            const driftMatch = report.match(/Drifted modules \| [^\d]*(\d+)/);
            const conflictMatch = report.match(/Replace conflicts \| [^\d]*(\d+)/);
            const driftCount = driftMatch ? parseInt(driftMatch[1]) : 0;
            const conflictCount = conflictMatch ? parseInt(conflictMatch[1]) : 0;

            const title = `📊 Dependency Drift Report — ${driftCount} drifted, ${conflictCount} conflicts`;

            // Ensure label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'fbca04',
                description: 'Automated dependency drift detection',
              });
            } catch (e) { /* exists */ }

            // Find existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              const issue = issues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title,
                body: report,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `🔄 **Weekly update** (${new Date().toISOString().split('T')[0]})\n\n${report}`,
              });
              core.info(`Updated issue #${issue.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: report,
                labels: [label],
              });
              core.info(`Created issue #${newIssue.number}`);
            }

            // Auto-close if fully aligned
            if (driftCount === 0 && conflictCount === 0 && issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info('All aligned — closed drift issue');
            }
