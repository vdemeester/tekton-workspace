name: Workspace Compatibility Check

on:
  schedule:
    # Every Monday at 9:00 UTC (after drift report at 8:00)
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

env:
  REPOS: >-
    pipeline triggers chains cli results
    operator pipelines-as-code dashboard
    plumbing pruner

jobs:
  workspace-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Clone Tekton repos
        run: |
          mkdir -p repos
          for repo in $REPOS; do
            echo "::group::Cloning $repo"
            git clone --depth 1 --quiet \
              "https://github.com/tektoncd/${repo}.git" "repos/${repo}" || \
              echo "::warning::Failed to clone $repo"
            echo "::endgroup::"
          done

      - name: Run workspace compatibility check
        run: |
          ./hack/workspace-check.py \
            --repos-dir ./repos \
            --format markdown \
            -o workspace-check.md \
            || true  # non-zero = breakage detected

          cat workspace-check.md

      - name: Create or update issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('workspace-check.md', 'utf8');
            const label = 'workspace-compat';

            // Extract compatible count from summary table
            const compatMatch = report.match(/Compatible repos \| [^\d]*(\d+)\/(\d+)/);
            const okCount = compatMatch ? parseInt(compatMatch[1]) : 0;
            const totalCount = compatMatch ? parseInt(compatMatch[2]) : 0;

            const title = `🔨 Workspace Compatibility — ${okCount}/${totalCount} repos build together`;

            // Ensure label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: '1d76db',
                description: 'Automated workspace compatibility check',
              });
            } catch (e) { /* exists */ }

            // Find existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              const issue = issues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title,
                body: report,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `🔄 **Weekly update** (${new Date().toISOString().split('T')[0]})\n\n${report}`,
              });
              core.info(`Updated issue #${issue.number}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: report,
                labels: [label],
              });
              core.info(`Created issue #${newIssue.number}`);
            }

            // Auto-close if fully compatible
            if (failCount === 0 && issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info('All repos compatible — closed issue');
            }
